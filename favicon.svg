<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  <rect width="100" height="100" rx="20" fill="url(#grad)"/>
  <!-- 放大镜圆圈 -->
  <circle cx="42" cy="42" r="20" fill="none" stroke="white" stroke-width="6"/>
  <!-- 放大镜手柄 -->
  <line x1="56" y1="56" x2="72" y2="72" stroke="white" stroke-width="6" stroke-linecap="round"/>
  <!-- 引用符号 " -->
  <text x="42" y="48" font-family="Arial, sans-serif" font-size="18" font-weight="bold" fill="white" text-anchor="middle">"</text>
</svg>